services:
  # Backend (Laravel)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: marbella-backend
    restart: always
    environment:
      APP_KEY: ${APP_KEY}
      GROQ_API_KEY: ${GROQ_API_KEY}
      DB_CONNECTION: mysql
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-3306}
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      SESSION_DRIVER: file
      CACHE_STORE: file
      QUEUE_CONNECTION: sync
      APP_NAME: MarbellaFacil
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: https://marbellafacil.rgardel.es
      APP_LOCALE: es

  # Frontend (React + Nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: marbella-frontend
    restart: always
    ports:
      - "3100:80"
    depends_on:
      - backend
