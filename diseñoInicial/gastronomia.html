<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gastronomía - Marbella Fácil</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="styles.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'], serif: ['Playfair Display', 'serif'] },
                    colors: { amber: { 400: '#fbbf24', 500: '#f59e0b', 600: '#d97706' }, slate: { 900: '#0f172a' } }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
</head>
<body class="bg-white font-sans text-slate-900">

    <!-- NAVBAR INTERNO -->
    <nav class="bg-slate-900 text-white py-4 shadow-md sticky top-0 z-50">
        <div class="container mx-auto px-6 flex justify-between items-center">
            <a href="index.html" class="flex items-center gap-2 group hover:opacity-80 transition-opacity">
                <span class="text-xl font-serif font-bold tracking-tight">
                    Marbella<span class="text-amber-500">.Fácil</span>
                </span>
            </a>
            <div class="hidden md:flex gap-8 text-sm font-medium">
                <a href="playas.html" class="hover:text-amber-500 transition-colors">Playas</a>
                <a href="transporte.html" class="hover:text-amber-500 transition-colors">Transporte</a>
                <a href="gastronomia.html" class="text-amber-500 transition-colors">Gastronomía</a>
                <a href="agenda.html" class="hover:text-amber-500 transition-colors">Agenda</a>
            </div>
            <div class="hidden md:flex items-center gap-4">
                <a href="empresas.html" class="text-xs font-semibold text-slate-300 hover:text-white transition-colors">
                    Soy Empresa
                </a>
                <a href="login.html" class="bg-amber-500 hover:bg-amber-600 text-white px-5 py-2 rounded text-xs font-bold transition-colors shadow-lg shadow-amber-900/20">
                    Iniciar Sesión
                </a>
            </div>
            <button class="md:hidden text-white" id="mobile-menu-btn">
                <i data-lucide="menu"></i>
            </button>
        </div>
    </nav>

    <header class="bg-slate-50 border-b border-slate-200 py-12">
        <div class="container mx-auto px-6 flex flex-col md:flex-row justify-between items-end">
            <div>
                <h1 class="text-4xl md:text-5xl font-serif text-slate-900 mb-4">Guía Gastronómica</h1>
                <p class="text-slate-500 text-lg">Descubre los sabores de la Costa del Sol.</p>
            </div>
            <!-- Buscador en Header -->
            <div class="mt-6 md:mt-0 w-full md:w-auto relative">
                <input type="text" placeholder="Buscar restaurante..." class="pl-10 pr-4 py-2 border border-slate-300 rounded-lg w-full md:w-64 focus:outline-none focus:border-amber-500">
                <i data-lucide="search" width="16" class="absolute left-3 top-3 text-slate-400"></i>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-6 py-12">
        
        <!-- Categorias -->
        <div class="flex gap-4 mb-10 overflow-x-auto pb-4">
            <button class="bg-slate-900 text-white px-4 py-2 rounded-full text-sm font-bold whitespace-nowrap">Todos</button>
            <button class="bg-slate-100 text-slate-600 hover:bg-slate-200 px-4 py-2 rounded-full text-sm font-bold whitespace-nowrap">Mediterránea</button>
            <button class="bg-slate-100 text-slate-600 hover:bg-slate-200 px-4 py-2 rounded-full text-sm font-bold whitespace-nowrap">Asiática</button>
            <button class="bg-slate-100 text-slate-600 hover:bg-slate-200 px-4 py-2 rounded-full text-sm font-bold whitespace-nowrap">Tapas</button>
            <button class="bg-slate-100 text-slate-600 hover:bg-slate-200 px-4 py-2 rounded-full text-sm font-bold whitespace-nowrap">Estrella Michelin</button>
        </div>

        <div class="grid md:grid-cols-2 lg:grid-cols-4 gap-8">
            <!-- Restaurante 1 -->
            <div class="group cursor-pointer">
                <div class="relative h-64 rounded-xl overflow-hidden mb-4">
                    <img src="https://images.unsplash.com/photo-1551024709-8f23befc6f87?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110">
                    <div class="absolute top-3 left-3 bg-white px-2 py-1 text-xs font-bold uppercase rounded">Marisco</div>
                </div>
                <h3 class="text-xl font-bold group-hover:text-amber-600 transition-colors">Lobito de Mar</h3>
                <div class="flex items-center gap-2 text-sm text-slate-500 mb-2">
                    <i data-lucide="map-pin" width="14"></i> Milla de Oro
                    <span class="text-amber-500 font-bold ml-auto">€€€</span>
                </div>
                <div class="flex gap-1 text-amber-400">
                    <i data-lucide="star" width="14" fill="currentColor"></i>
                    <i data-lucide="star" width="14" fill="currentColor"></i>
                    <i data-lucide="star" width="14" fill="currentColor"></i>
                    <i data-lucide="star" width="14" fill="currentColor"></i>
                    <i data-lucide="star" width="14" fill="currentColor"></i>
                </div>
            </div>

            <!-- Restaurante 2 -->
            <div class="group cursor-pointer">
                <div class="relative h-64 rounded-xl overflow-hidden mb-4">
                    <img src="https://images.unsplash.com/photo-1595295333158-4742f28fbd85?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110">
                    <div class="absolute top-3 left-3 bg-white px-2 py-1 text-xs font-bold uppercase rounded">Italiana</div>
                </div>
                <h3 class="text-xl font-bold group-hover:text-amber-600 transition-colors">Da Bruno Sul Mare</h3>
                <div class="flex items-center gap-2 text-sm text-slate-500 mb-2">
                    <i data-lucide="map-pin" width="14"></i> Paseo Marítimo
                    <span class="text-amber-500 font-bold ml-auto">€€</span>
                </div>
                <div class="flex gap-1 text-amber-400">
                    <i data-lucide="star" width="14" fill="currentColor"></i>
                    <i data-lucide="star" width="14" fill="currentColor"></i>
                    <i data-lucide="star" width="14" fill="currentColor"></i>
                    <i data-lucide="star" width="14" fill="currentColor"></i>
                    <i data-lucide="star-half" width="14" fill="currentColor"></i>
                </div>
            </div>

            <!-- Restaurante 3 -->
            <div class="group cursor-pointer">
                <div class="relative h-64 rounded-xl overflow-hidden mb-4">
                    <img src="https://images.unsplash.com/photo-1544025162-d76694265947?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110">
                    <div class="absolute top-3 left-3 bg-white px-2 py-1 text-xs font-bold uppercase rounded">Fusión</div>
                </div>
                <h3 class="text-xl font-bold group-hover:text-amber-600 transition-colors">Nobu Marbella</h3>
                <div class="flex items-center gap-2 text-sm text-slate-500 mb-2">
                    <i data-lucide="map-pin" width="14"></i> Puente Romano
                    <span class="text-amber-500 font-bold ml-auto">€€€€</span>
                </div>
                <div class="flex gap-1 text-amber-400">
                    <i data-lucide="star" width="14" fill="currentColor"></i>
                    <i data-lucide="star" width="14" fill="currentColor"></i>
                    <i data-lucide="star" width="14" fill="currentColor"></i>
                    <i data-lucide="star" width="14" fill="currentColor"></i>
                    <i data-lucide="star" width="14" fill="currentColor"></i>
                </div>
            </div>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
